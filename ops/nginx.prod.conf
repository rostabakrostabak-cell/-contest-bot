server {
    listen 80;
    server_name rtbkonkurs.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name rtbkonkurs.ru;

    ssl_certificate /etc/letsencrypt/live/rtbkonkurs.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rtbkonkurs.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/contest/dist;
    index index.html;

    location /miniapp/ {
        alias /var/www/contest/dist/;
        try_files $uri $uri/ /index.html;
    }

    location /miniapp {
        return 301 /miniapp/;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location / {
        return 404;
    }
}
